<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
   <link rel="stylesheet" href="styles.css">
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cherry+Bomb+One&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <header>
    <h1>BASIC B CALCULATOR</h1>
    </header>

<div id="main">
    <div id="frame">
        <div id="field">
            <label for="userInput"></label>
            <input 
                type="text"
                id="userInput"
                name="userInput"
                required
                size="33"
                minlength="1"
                inputmode="numeric"
                />
        </div>
            
        <div id="answer"></div>
    </div>



   
    <div class="mainframe">
        <div id="grid"></div>
        <div id="operators"></div>    
    </div>

        <div id="bottom-row">
        </div>
</div>

</div>
<footer> Copyright &copy; Yessi Kenney <a href="https://github.com/yesskenn"></a><i class="fab fa-github" aria-hidden="true"></i></a></footer>

    <script src="script.js"></script>
</body>
</html>
