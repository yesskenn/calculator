<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
   <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>BASIC B CALCULATOR</h1>
    <div class="frame">
        <label for="userInput"></label>
        <input 
            type="text"
            id="userInput"
            name="userInput"
            required
            size="33"
            minlength="1"
            inputmode="numeric"
            />
        <input id="enterBtn" type="submit" value="Send"></input>
        <div id="grid">
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
